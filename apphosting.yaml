# Firebase App Hosting configuration file
# See: https://firebase.google.com/docs/app-hosting/configure

# Infrastructure setup
runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables
env:
  # The Google Maps API Key needs to be baked into the client bundle, so it must be available during BUILD
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    value: "AIzaSyAlrXvSIc6xA6rK3YaVA536XJi0074ToO4"
    availability:
      - BUILD
      - RUNTIME

  # Firebase API Configuration keys
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyAxWdvpzn9zuaJhCqGsWIYyV-3HbzqwxOU"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "axeflowlotus-6dc3b.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "axeflowlotus-6dc3b"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "axeflowlotus-6dc3b.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "3397723577"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:3397723577:web:b01767bac20bd14c460268"
    availability:
      - BUILD
